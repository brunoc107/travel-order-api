services:
  migrate:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    environment:
      ENABLE_CACHE: false
    depends_on:
      - mysql
    volumes:
      - ./:/var/www
    command: >
      sh -c "
        while ! nc -z mysql 3306; do sleep 1; done;
        php artisan migrate --force
        php artisan db:seed --force
      "

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    environment:
      ENABLE_CACHE: false
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    environment:
      ENABLE_CACHE: false
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work redis --tries=3 --timeout=90

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template
    environment:
      PHP_FPM_HOST: api
      PHP_FPM_PORT: 9000
    depends_on:
      - api

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onfly_order_api
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: laravel_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
