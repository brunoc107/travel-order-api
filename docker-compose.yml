services:
  migrate:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    environment:
      ENABLE_CACHE: false
    depends_on:
      - mysql
    volumes:
      - ./:/var/www
    command: >
      sh -c "
        while ! nc -z mysql 3306; do sleep 1; done;
        php artisan migrate --force
        php artisan db:seed --force
      "

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    environment:
      ENABLE_CACHE: false
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis

  worker-email:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    environment:
      ENABLE_CACHE: false
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work redis --queue=mail

  worker-sms:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    environment:
      ENABLE_CACHE: false
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work redis --queue=sms

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template
    environment:
      PHP_FPM_HOST: api
      PHP_FPM_PORT: 9000
    depends_on:
      - api

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onfly_order_api
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"

  mailhog:
    platform: linux/x86_64
    image: mailhog/mailhog:latest
    user: root
    environment:
      HTTPS_METHOD: noredirect
      MH_STORAGE: maildir
      MH_MAILDIR_PATH: /maildir
      MH_MAILDIR_PERMS: 755
    logging:
      driver: 'none'
    ports:
      - "8003:1025"
      - "8100:8025"
    volumes:
      - 'mailhog_data:/maildir'
    command: ["-storage=maildir", "-maildir-path=/maildir"]

volumes:
  mysql_data:
  mailhog_data:
